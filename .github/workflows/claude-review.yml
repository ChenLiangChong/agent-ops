# P2 真接線：每個 PR 由 Claude 自動 review。
# 認證走「訂閱」：CLAUDE_CODE_OAUTH_TOKEN（Pro/Max 跑 `claude setup-token` 產生，放 repo secret），
# 不用 ANTHROPIC_API_KEY、不按 token 計費——官方文件明載支援。
# 注意：找出的問題照 severity 留言；要硬 gate merge 再加一個解析 severity 的 required check。
name: Claude PR Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 不裝 Claude GitHub App 的替代路徑：直接給 Actions 內建 token（留言者會是 github-actions[bot]）
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR: ${{ github.event.pull_request.number }}
            你是這個 repo 的 reviewer agent。照 charters/reviewer.md 的鐵律與
            specs/code-review.spec.json 的標準 review 這個 PR：
            測試覆蓋、diff 大小、描述完整度、安全性（審批繞過、身分偽造、SQL 組裝）。
            發現按 severity 分級：行內意見用 mcp__github_inline_comment__create_inline_comment
            標到具體行，總結用 `gh pr comment` 留一則。用繁體中文（台灣用語）。
          claude_args: '--allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"'
