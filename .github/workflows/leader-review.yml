# 第二道 review：leader / architect 定期深審（記憶感知）。
# 跟第一道（caveman per-PR 即時）刻意不同：**定期掃描**，但只審「有新 commit、當前 HEAD 還沒被 leader 審過」的 open PR。
# 確定性 shell gate 先算出該審哪些——沒有就根本不叫醒 Claude（省訂閱額度、不在舊 PR 上洗版）。
# 這正是平台哲學：確定性邏輯把關、LLM 只做需要智能的部分。
# 認證走訂閱 OAuth。底座 plugin = Anthropic 官方 code-review。
name: Leader Review（排程深審）
on:
  schedule:
    - cron: "0 * * * 1-5"   # 平日每小時整點「掃描」一次。掃描很便宜；只有有新 commit 的 PR 才會真的叫醒 Claude。
  workflow_dispatch:

jobs:
  leader-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 掃描——挑出「有新 commit、當前 HEAD 未被 leader 審過」的 open PR
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          targets=""
          for pr in $(gh pr list --state open --json number --jq '.[].number'); do
            head_sha=$(gh pr view "$pr" --json headRefOid --jq '.headRefOid')
            # 這個 PR 的評論裡有沒有「已審過當前 head_sha」的標記？有就跳過——對已審 commit 重審沒意義。
            if gh pr view "$pr" --json comments --jq '.comments[].body' \
                 | grep -q "leader-review-sha: $head_sha"; then
              echo "· PR #$pr 當前 commit (${head_sha:0:7}) 已審過 → 跳過"
              continue
            fi
            echo "· PR #$pr (${head_sha:0:7}) 有新 commit → 需深審"
            targets="$targets $pr:$head_sha"
          done
          targets="$(echo "$targets" | xargs)"   # trim
          if [ -z "$targets" ]; then
            echo "沒有需要深審的 PR——不叫醒 Claude。"
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
          else
            echo "需深審：$targets"
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
            echo "targets=$targets" >> "$GITHUB_OUTPUT"
          fi

      - name: Leader review（只在有目標時才啟動 Claude）
        if: steps.scan.outputs.has_targets == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 官方 code-review plugin 當深審底座（5 個並行 agent + 0–100 信心分數過濾）
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: |
            你是這個 repo 的 leader / architect reviewer，做定期深審（不是逐行守門，那是第一道 caveman 的事）。
            REPO: ${{ github.repository }}
            只審這些「有新 commit」的 PR（格式 `PR號:head_sha`，空白分隔）：
            ${{ steps.scan.outputs.targets }}

            對每個 PR：
            1. 先讀 `memory/review-rules.md`——平台從組織記憶投影出來的累積規矩，當成資深 leader 的記性。
            2. 用 `/code-review:code-review ${{ github.repository }}/pull/<PR號>` 做深審，並**額外**對照
               `memory/review-rules.md` 查兩件第一道查不到的事：
               (a) 過去被糾正過的問題有沒有重蹈覆轍（引用對應規矩的出處）；
               (b) 跨 PR 的系統性 / 架構問題（模組邊界、技術債、跨檔一致性）。
            3. 留一則總結評論（`gh pr comment`），開頭標「🧠 Leader Review（記憶感知）」，
               **結尾原樣貼上這一行標記**（用上面給你的對應 head_sha，不要自己改、不要重算）：
               `<!-- leader-review-sha: <該PR的head_sha> -->`
               這個標記讓下次排程知道這個 commit 已審過、不重複審。
            用繁體中文（台灣用語）。
          claude_args: '--allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr list:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"'
